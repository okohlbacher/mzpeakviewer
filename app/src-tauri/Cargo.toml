[package]
name = "mzpeakviewer"
version = "0.0.0"
description = "mzPeakViewer — client-side mass-spec viewer"
authors = ["mzPeak"]
edition = "2021"
rust-version = "1.77.2"

# The library the binary links against. Tauri's mobile/desktop entrypoint lives
# in lib.rs (run() is generated by the tauri macro pipeline); main.rs is a thin
# shim. The crate-type cdylib is required for the (future) mobile targets and is
# harmless on desktop.
[lib]
name = "mzpeakviewer_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Smaller, faster release bundles. These do not change behavior — they only
# shrink the binary the bundlers package on each OS.
[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
